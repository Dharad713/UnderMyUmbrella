name: Daily Weather Text

on:
  workflow_dispatch:

  schedule:
    - cron: "17 7 * * *" # runs at 7:17 so there is less traffic
      timezone: "America/New_York"

jobs:
  send-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Send weather text
        env:
          HOME_LAT: ${{ secrets.HOME_LAT }}
          HOME_LONG: ${{ secrets.HOME_LONG }}
          PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}

          # Add the credentials required by your texting service.
          TEXT_API_KEY: ${{ secrets.TEXT_API_KEY }}
          TEXT_API_USERNAME: ${{ secrets.TEXT_API_USERNAME }}

        run: python -m weather.main