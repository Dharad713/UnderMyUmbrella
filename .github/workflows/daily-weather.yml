name: Daily Weather Text

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Print the weather message without sending a text"
        required: true
        default: true
        type: boolean

  schedule:
    - cron: "17 7 * * *"
      timezone: "America/New_York"

jobs:
  send-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run weather job
        env:
          HOME_LAT: ${{ secrets.HOME_LAT }}
          HOME_LONG: ${{ secrets.HOME_LONG }}
          PHONE_NUMBER: ${{ secrets.PHONE_NUMBER }}
          TEXTBELT_API_KEY: ${{ secrets.TEXTBELT_API_KEY }}

        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            python -m weather.main --dry
          else
            python -m weather.main
          fi